server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs: /how-it-works resolves to how-it-works.html before any fallback.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Stylesheets and scripts must revalidate, so style changes show right away.
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
    }

    # HTML must always revalidate, so deploys show immediately.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Images: cache for a week, but never immutable, so swapped art updates.
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
